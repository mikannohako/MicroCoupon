
services:
  django:
    image: ghcr.io/mikannohako/microcoupon:latest
    build: 
      context: ./django
      dockerfile: Dockerfile
    container_name: django
    command:  >
      sh -c "
      python manage.py runserver 0.0.0.0:8000
      "
    volumes: 
      - ./django:/app
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - db
    expose:
      - "8000"

  db:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  nginx:
    image:  nginx:latest
    container_name: nginx
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./django/staticfiles:/app/staticfiles
      - ${BASIC_AUTH_FILE_HOST}:/etc/nginx/.htpasswd:ro
    depends_on:
      - django
      - db

volumes:
  static_volume:
  pgdata: 
