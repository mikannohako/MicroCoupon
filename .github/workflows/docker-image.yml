name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build \
        -f docker/django/Dockerfile \
        -t my-image-name:$(date +%s) \
        .

    - name: Docker Compose up
      run: docker compose up -d --build
