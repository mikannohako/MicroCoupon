name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
			- name: Setup SSH
  			uses: webfactory/ssh-agent@v0.9.0
  			with:
    				ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: mikan
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/mikan/microcoupon
            docker compose pull
            docker compose up -d

