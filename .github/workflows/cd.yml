name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: mikan
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/mikan/microcoupon
            docker compose pull
            docker compose up -d