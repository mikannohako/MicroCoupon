{% extends 'dashboard/base.html' %}

{% block title %}{{ product.name }} を編集 - MicroCoupon{% endblock %}
{% block page_title %}商品を編集{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="category">店舗 <span class="required">*</span></label>
                <select name="category" id="category" required>
                    <option value="">選択してください</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if cat.id == product.room.id %}selected{% endif %}>
                            {{ cat.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="name">品目 <span class="required">*</span></label>
                <input type="text" name="name" id="name" value="{{ product.name }}" required>
            </div>
            
            <div class="form-group">
                <label for="price">値段(pt) <span class="required">*</span></label>
                <input type="number" name="price" id="price" value="{{ product.price }}" required min="1">
            </div>
            
            <div class="form-group">
                <label for="description">説明</label>
                <textarea name="description" id="description" rows="3">{{ product.description }}</textarea>
            </div>
            
            <div class="form-group">
                <label for="display_order">表示順</label>
                <input type="number" name="display_order" id="display_order" value="{{ product.display_order }}" min="0">
                <small>数値が小さいほど上に表示されます</small>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %}>
                    <span>販売中</span>
                </label>
            </div>
            
            <div class="form-actions">
                <a href="{% url 'dashboard:product_list' %}" class="btn btn-secondary">キャンセル</a>
                <button type="submit" class="btn btn-primary">更新</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
