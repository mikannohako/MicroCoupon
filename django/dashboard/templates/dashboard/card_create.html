{% extends 'dashboard/base.html' %}

{% block title %}カード発行 - MicroCoupon{% endblock %}
{% block page_title %}カード発行{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>新規カード発行</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="balance">初期残高 (pt)</label>
                <input type="number" id="balance" name="balance" value="1000" min="0" step="100" required>
                <small>カードの初期残高を設定してください</small>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">発行する</button>
                <a href="{% url 'dashboard:card_list' %}" class="btn btn-secondary">キャンセル</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
