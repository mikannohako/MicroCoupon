{% extends 'dashboard/base.html' %}

{% block title %}商品を追加 - MicroCoupon{% endblock %}
{% block page_title %}商品を追加{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="category">教室 <span class="required">*</span></label>
                <select name="category" id="category" required>
                    <option value="">選択してください</option>
                    {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="name">品目 <span class="required">*</span></label>
                <input type="text" name="name" id="name" required placeholder="例: コーヒー">
            </div>
            
            <div class="form-group">
                <label for="price">値段(pt) <span class="required">*</span></label>
                <input type="number" name="price" id="price" required min="1" placeholder="例: 100">
            </div>
            
            <div class="form-group">
                <label for="description">説明</label>
                <textarea name="description" id="description" rows="3" placeholder="商品の説明（任意）"></textarea>
            </div>
            
            <div class="form-group">
                <label for="display_order">表示順</label>
                <input type="number" name="display_order" id="display_order" value="0" min="0">
                <small>数値が小さいほど上に表示されます</small>
            </div>
            
            <div class="form-actions">
                <a href="{% url 'dashboard:product_list' %}" class="btn btn-secondary">キャンセル</a>
                <button type="submit" class="btn btn-primary">追加</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
