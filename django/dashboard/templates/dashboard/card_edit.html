{% extends 'dashboard/base.html' %}

{% block title %}カード編集 - MicroCoupon{% endblock %}
{% block page_title %}カード編集{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>シリアル番号</label>
                <input type="text" value="{{ card.serial_number }}" disabled style="background: #f7fafc; cursor: not-allowed;">
                <small>シリアル番号は変更できません</small>
            </div>
            
            <div class="form-group">
                <label for="balance">残高(pt) <span class="required">*</span></label>
                <input type="number" name="balance" id="balance" value="{{ card.balance }}" required min="0" max="{{ card.balance }}">
                <small style="color: #e53e3e;">※ 残高を増やすことはできません（減少のみ可能）</small>
            </div>
            
            <div class="form-group">
                <label for="status">ステータス <span class="required">*</span></label>
                <select name="status" id="status" required>
                    <option value="unused" {% if card.status == 'unused' %}selected{% endif %}>未使用</option>
                    <option value="active" {% if card.status == 'active' %}selected{% endif %}>有効</option>
                    <option value="used" {% if card.status == 'used' %}selected{% endif %}>使用済み</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_locked" {% if card.is_locked %}checked{% endif %}>
                    <span>ロック</span>
                </label>
                <small>ロックすると、このカードは使用できなくなります</small>
            </div>
            
            <div class="detail-divider" style="margin: 20px 0;"></div>
            
            <!-- QRコード表示 -->
            <div class="qr-code-section">
                <h3>QRコード</h3>
                <div class="qr-code-container">
                    <img src="{{ qr_image }}" alt="QRコード" class="qr-code-image">
                    <p class="qr-code-url">{{ qr_url }}</p>
                    <small>このQRコードをスキャンすると残高を確認できます</small>
                </div>
            </div>
            
            <div class="form-actions" style="margin-top: 20px;">
                <a href="{% url 'dashboard:card_detail' card.id %}" class="btn btn-secondary">キャンセル</a>
                <button type="submit" class="btn btn-primary">更新</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
